                    รับข้อมูลและคุยผ่าน LINE

        <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center rounded-[1.5rem]">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const LINE_URL = "https://line.me/R/ti/p/@SURE141"; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzcuLvRe4ggE9kJuckF-FYKAw4IJ7IVjr92XOZsNCZ0yV2fGNZ6RLdsqku0zaTk3nSm/exec";

        const YOUR_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAm3UhBeh1eli5pqwj5M2psXy1BnpQUI-Y",
            authDomain: "affiliate-583a4.firebaseapp.com",
            projectId: "affiliate-583a4",
            storageBucket: "affiliate-583a4.firebasestorage.app",
            messagingSenderId: "676676456404",
            appId: "1:676676456404:web:1aafdc4e1540f301841041",
            measurementId: "G-YK5GCP8ECY"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const shopParam = urlParams.get('shop');
        let hiddenShopName = null;

        if (shopParam) {
            hiddenShopName = shopParam;
            document.getElementById('shopFieldContainer').classList.add('hidden');
            document.getElementById('shopName').removeAttribute('required');
        }

        const ADMIN_PIN = "SURE0635824615";
        let currentPopupData = null; 
        let isPopupShowing = false;

        function shouldShowPopup() {
            const hiddenUntil = localStorage.getItem('hidePopupUntil');
            if (hiddenUntil) {
                if (Date.now() < parseInt(hiddenUntil, 10)) {
                    return false; 
                } else {
                    localStorage.removeItem('hidePopupUntil'); 
                }
            }
            return true;
        }

        // ฟังก์ชันโหลดรูปภาพแบบไม่ให้กระพริบ
        function setImages(bgUrl, headerUrl) {
            const bgImg = document.getElementById('pageBackgroundImage');
            const targetBg = bgUrl || "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=2075&q=80";
            if (bgImg.getAttribute('src') !== targetBg) {
                bgImg.onload = () => { bgImg.classList.remove('opacity-0'); bgImg.classList.add('opacity-25'); };
                bgImg.src = targetBg;
            } else {
                bgImg.classList.remove('opacity-0'); 
                bgImg.classList.add('opacity-25');
            }

            const headerImg = document.getElementById('mainHeaderImage');
            const targetHeader = headerUrl || "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?ixlib=rb-4.0.3&auto=format&fit=crop&w=1170&q=80";
            if (headerImg.getAttribute('src') !== targetHeader) {
                headerImg.onload = () => { headerImg.classList.remove('opacity-0'); headerImg.classList.add('opacity-100'); };
                headerImg.src = targetHeader;
            } else {
                headerImg.classList.remove('opacity-0');
                headerImg.classList.add('opacity-100');
            }
        }

        const mainView = document.getElementById('mainView');
        const adminView = document.getElementById('adminView');
        const popupModal = document.getElementById('popupModal');

        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const adminPasswordInput = document.getElementById('adminPassword');
        const eyeOpenIcon = document.getElementById('eyeOpenIcon');
        const eyeClosedIcon = document.getElementById('eyeClosedIcon');

        togglePasswordBtn.addEventListener('click', () => {
            if (adminPasswordInput.type === 'password') {
                adminPasswordInput.type = 'text';
                eyeOpenIcon.classList.add('hidden');
                eyeClosedIcon.classList.remove('hidden');
            } else {
                adminPasswordInput.type = 'password';
                eyeOpenIcon.classList.remove('hidden');
                eyeClosedIcon.classList.add('hidden');
            }
        });

        document.getElementById('openAdminBtn').addEventListener('click', () => {
            mainView.classList.add('hidden');
            adminView.classList.remove('hidden');
        });

        document.getElementById('backToHomeBtn').addEventListener('click', () => {
            adminView.classList.add('hidden');
            mainView.classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
            adminPasswordInput.type = 'password'; 
            eyeOpenIcon.classList.remove('hidden');
            eyeClosedIcon.classList.add('hidden');
            
            if (currentPopupData && currentPopupData.isActive && currentPopupData.imageUrl && shouldShowPopup()) {
                document.getElementById('hidePopup24h').checked = false; 
                document.getElementById('popupImage').src = currentPopupData.imageUrl;
                popupModal.classList.remove('hidden');
                isPopupShowing = true;
            }
        });

        document.getElementById('loginAdminBtn').addEventListener('click', () => {
            if (document.getElementById('adminPassword').value === ADMIN_PIN) {
                document.getElementById('adminLoginForm').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        });

        document.getElementById('logoutAdminBtn').addEventListener('click', () => {
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminLoginForm').classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
            adminPasswordInput.type = 'password'; 
            eyeOpenIcon.classList.remove('hidden');
            eyeClosedIcon.classList.add('hidden');
        });

        document.getElementById('closePopupBtn').addEventListener('click', () => {
            popupModal.classList.add('hidden');
            isPopupShowing = false;
            
            if (document.getElementById('hidePopup24h').checked) {
                const hideUntil = Date.now() + (24 * 60 * 60 * 1000); 
                localStorage.setItem('hidePopupUntil', hideUntil);
            }
        });

        let currentUser = null;
        let db = null;
        let auth = null;
        let dbPath = [];

        try {
            let firebaseConfig = YOUR_FIREBASE_CONFIG;
            
            if (!YOUR_FIREBASE_CONFIG.apiKey && typeof __firebase_config !== 'undefined') {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                firebaseConfig = JSON.parse(configStr);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                dbPath = ['artifacts', appId, 'public', 'data', 'popup_config', 'settings'];
            } else if (YOUR_FIREBASE_CONFIG.apiKey) {
                dbPath = ['popup_data', 'settings'];
            }
            
            if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                const initAuth = async () => {
                    try { 
                        if (!YOUR_FIREBASE_CONFIG.apiKey && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth); 
                        }
                    } 
                    catch (error) { console.error("Auth error:", error); setImages(null, null); }
                };

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) loadPopupSettings();
                });
                initAuth();
            } else {
                setImages(null, null); // โหลดรูปเริ่มต้นกรณีไม่มี Config
            }
        } catch (err) {
            console.error("Firebase init failed:", err);
            setImages(null, null); // โหลดรูปเริ่มต้นกรณี Error
        }

        function loadPopupSettings() {
            if (!currentUser || !db || dbPath.length === 0) {
                setImages(null, null);
                return;
            }
            const docRef = doc(db, ...dbPath);
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentPopupData = data; 
                    
                    document.getElementById('popupActiveToggle').checked = data.isActive === true;
                    
                    if (data.imageUrl) {
                        document.getElementById('adminImagePreview').src = data.imageUrl;
                        document.getElementById('adminImagePreview').classList.remove('hidden');
                        document.getElementById('noImageText').classList.add('hidden');
                        
                        if (data.isActive && adminView.classList.contains('hidden') && !isPopupShowing && shouldShowPopup()) {
                            document.getElementById('hidePopup24h').checked = false;
                            document.getElementById('popupImage').src = data.imageUrl;
                            popupModal.classList.remove('hidden');
                            isPopupShowing = true;
                        }
                    }

                    // เรียกใช้ฟังก์ชันเซ็ตภาพพื้นหลัง/หน้าปก โดยไม่ให้กระพริบ
                    setImages(data.bgImageUrl, data.headerImageUrl);

                    if (data.headerImageUrl) {
                        document.getElementById('adminHeaderImagePreview').src = data.headerImageUrl;
                        document.getElementById('adminHeaderImagePreview').classList.remove('hidden');
                        document.getElementById('noHeaderImageText').classList.add('hidden');
                    }

                    if (data.bgImageUrl) {
                        document.getElementById('adminBgImagePreview').src = data.bgImageUrl;
                        document.getElementById('adminBgImagePreview').classList.remove('hidden');
                        document.getElementById('noBgImageText').classList.add('hidden');
                    }
                } else {
                    setImages(null, null);
                }
            }, (error) => {
                console.error("Snapshot Error: ", error);
                setImages(null, null);
            });
        }

        function handleImageUpload(inputId, previewId, placeholderId, callback, maxWidth = 800) {
            document.getElementById(inputId).addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        
                        const base64 = canvas.toDataURL('image/webp', 0.8);
                        document.getElementById(previewId).src = base64;
                        document.getElementById(previewId).classList.remove('hidden');
                        document.getElementById(placeholderId).classList.add('hidden');
                        callback(base64);
                    };
                };
            });
        }

        let uploadedBase64 = null;
        let uploadedHeaderBase64 = null;
        let uploadedBgBase64 = null;

        handleImageUpload('popupImageUpload', 'adminImagePreview', 'noImageText', (base64) => uploadedBase64 = base64, 800);
        handleImageUpload('headerImageUpload', 'adminHeaderImagePreview', 'noHeaderImageText', (base64) => {
            uploadedHeaderBase64 = base64;
            document.getElementById('mainHeaderImage').src = base64; 
        }, 1000);
        handleImageUpload('bgImageUpload', 'adminBgImagePreview', 'noBgImageText', (base64) => {
            uploadedBgBase64 = base64;
            document.getElementById('pageBackgroundImage').src = base64; 
        }, 1200);

        document.getElementById('savePopupBtn').addEventListener('click', async () => {
            if (!db) return alert("ไม่สามารถบันทึกได้! กรุณาตั้งค่า Firebase Config");
            if (!currentUser) return alert("กำลังเชื่อมต่อระบบ กรุณารอสักครู่");
            
            const btn = document.getElementById('savePopupBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                กำลังบันทึก...
            `;
            
            try {
                const docRef = doc(db, ...dbPath);
                const dataToSave = { 
                    isActive: document.getElementById('popupActiveToggle').checked 
                };
                
                if (uploadedBase64) dataToSave.imageUrl = uploadedBase64;
                else if (currentPopupData && currentPopupData.imageUrl) dataToSave.imageUrl = currentPopupData.imageUrl;

                if (uploadedHeaderBase64) dataToSave.headerImageUrl = uploadedHeaderBase64;
                else if (currentPopupData && currentPopupData.headerImageUrl) dataToSave.headerImageUrl = currentPopupData.headerImageUrl;

                if (uploadedBgBase64) dataToSave.bgImageUrl = uploadedBgBase64;
                else if (currentPopupData && currentPopupData.bgImageUrl) dataToSave.bgImageUrl = currentPopupData.bgImageUrl;

                await setDoc(docRef, dataToSave, { merge: true });
                alert("บันทึกการตั้งค่าเรียบร้อย!\n(กดปุ่ม 'ปิดหน้าต่างนี้' เพื่อดูตัวอย่าง)");
            } catch (error) {
                console.error("Save Error: ", error);
                if (error.code === 'permission-denied') {
                    alert("⚠️ บันทึกไม่สำเร็จ: ติดระบบรักษาความปลอดภัยของ Firebase\nกรุณาตั้งค่า Rules ให้เป็น allow read, write: if true;");
                } else {
                    alert("เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่อีกครั้ง");
                }
            } finally {
                btn.innerHTML = originalText;
            }
        });

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            
            let finalShopName = hiddenShopName || document.getElementById('shopName').value;
            if(!finalShopName) finalShopName = "ไม่ระบุแหล่งที่มา";

            document.getElementById('loadingOverlay').classList.remove('hidden');

            const formData = new FormData();
            formData.append('fullName', fullName);
            formData.append('phone', "'" + phone); 
            formData.append('shopName', finalShopName);

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' 
                });
                window.location.href = LINE_URL;
            } catch (error) {
                console.error("Error: ", error);
                window.location.href = LINE_URL; 
            }
        });
    </script>
</body>
