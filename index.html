<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนรับสิทธิพิเศษ - โครงการบ้าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative">

    <!-- ปุ่มลับสำหรับแอดมิน (ย้ายมาขวาบน) -->
    <button id="openAdminBtn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 focus:outline-none transition-colors z-[60] p-2 bg-white/50 backdrop-blur-sm rounded-full shadow-sm" title="สำหรับผู้ดูแลระบบ">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
    </button>

    <!-- Popup Modal -->
    <div id="popupModal" class="hidden fixed inset-0 bg-black/70 z-[100] flex flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="relative max-w-lg w-full bg-transparent rounded-2xl overflow-hidden transform transition-transform" id="popupContent">
            <button id="closePopupBtn" class="absolute top-2 right-2 bg-black/50 text-white rounded-full p-2 hover:bg-black/80 z-10 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <img id="popupImage" src="" alt="Promotion Popup" class="w-full h-auto object-contain max-h-[80vh] rounded-2xl shadow-2xl">
        </div>
    </div>

    <!-- Admin View (ซ่อนไว้ตอนแรก) -->
    <div id="adminView" class="hidden glass-effect w-full max-w-md rounded-2xl shadow-2xl overflow-hidden mb-4 relative z-50">
        <div class="bg-gray-800 p-4 text-white text-center font-bold text-xl flex justify-between items-center">
            <span>ระบบหลังบ้าน</span>
            <button id="backToHomeBtn" class="text-sm font-normal text-gray-300 hover:text-white bg-gray-700 px-3 py-1 rounded">ปิดหน้าต่างนี้</button>
        </div>
        
        <!-- Login Form -->
        <div id="adminLoginForm" class="p-6">
            <p class="mb-4 text-sm text-gray-600">กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบ</p>
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-blue-500 mb-4 outline-none text-center tracking-widest">
            <button id="loginAdminBtn" class="w-full bg-gray-800 text-white py-3 rounded-lg font-medium hover:bg-gray-900 transition-colors">เข้าสู่ระบบ</button>
        </div>

        <!-- Dashboard Form -->
        <div id="adminDashboard" class="hidden p-6 space-y-5">
            <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg border shadow-sm">
                <span class="font-medium text-gray-700">เปิดแสดงป็อปอัพให้ลูกค้าเห็น</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="popupActiveToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#00B900]"></div>
                </label>
            </div>

            <div class="border border-gray-200 p-4 rounded-lg bg-white shadow-sm">
                <label class="block text-sm font-medium text-gray-700 mb-2">อัปโหลดรูปภาพใหม่ (จะถูกย่อขนาดให้อัตโนมัติ)</label>
                <input type="file" id="popupImageUpload" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                
                <div class="mt-4 border border-dashed border-gray-300 rounded-lg p-2 bg-gray-50 relative min-h-[150px] flex items-center justify-center overflow-hidden">
                    <p id="noImageText" class="text-sm text-gray-400 absolute">ยังไม่มีรูปภาพป็อปอัพ</p>
                    <img id="adminImagePreview" src="" class="w-full h-auto max-h-48 object-contain rounded hidden relative z-10">
                </div>
            </div>

            <button id="savePopupBtn" class="w-full bg-blue-600 text-white py-3.5 rounded-lg font-medium hover:bg-blue-700 transition-colors flex justify-center items-center shadow-lg">
                บันทึกการตั้งค่าป็อปอัพ
            </button>
            <div class="text-center">
                <button id="logoutAdminBtn" class="text-red-500 text-sm hover:underline mt-2">ออกจากระบบหลังบ้าน</button>
            </div>
        </div>
    </div>

    <!-- Container สำหรับลูกค้า -->
    <div id="mainView" class="glass-effect w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        
        <!-- Header Image -->
        <div class="h-40 bg-blue-600 relative flex items-center justify-center">
            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?ixlib=rb-4.0.3&auto=format&fit=crop&w=1170&q=80" alt="House" class="absolute inset-0 w-full h-full object-cover opacity-60">
            <div class="relative z-10 text-center px-4">
                <h1 class="text-2xl font-bold text-white drop-shadow-md">โครงการบ้านจัดสรร</h1>
                <p class="text-blue-100 text-sm mt-1 drop-shadow">ลงทะเบียนรับข้อมูลและโปรโมชั่นพิเศษ</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="p-6 md:p-8">
            <form id="leadForm" class="space-y-5">
                
                <!-- ชื่อ-นามสกุล -->
                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">ชื่อ - นามสกุล <span class="text-red-500">*</span></label>
                    <input type="text" id="fullName" required placeholder="กรอกชื่อของคุณ" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- เบอร์โทรศัพท์ -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์ <span class="text-red-500">*</span></label>
                    <input type="tel" id="phone" required placeholder="08X-XXX-XXXX" pattern="[0-9]{10}"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    <p class="text-xs text-gray-500 mt-1">กรอกตัวเลข 10 หลัก ติดกัน</p>
                </div>

                <!-- สาขาร้านกาแฟ (ตัวนี้จะถูกซ่อนอัตโนมัติหากเข้าจากลิงก์ร้านกาแฟ) -->
                <div id="shopFieldContainer">
                    <label for="shopName" class="block text-sm font-medium text-gray-700 mb-1">คุณสแกน QR Code จากที่ไหน? <span class="text-red-500">*</span></label>
                    <select id="shopName" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                        <option value="" disabled selected>-- กรุณาเลือก --</option>
                        <option value="ปัด • จุ • บัน Van Coffee Shop">ร้าน ปัด • จุ • บัน Van Coffee Shop</option>
                        <option value="อื่นๆ (แผ่นพับ, ใบปลิว, นามบัตร)">อื่นๆ (แผ่นพับ, ใบปลิว, นามบัตร)</option>
                    </select>
                </div>

                <!-- ปุ่ม Submit -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-[#00B900] hover:bg-[#009900] text-white font-medium py-3.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors shadow-lg shadow-green-200 mt-4">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current">
                        <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.114.281.072.717.035.997l-.239 1.428c-.066.411-.318 1.559 1.365.849 1.684-.71 9.098-5.36 10.973-8.816 1.033-1.895 1.488-3.715 1.488-5.264zm-15.08 2.809h-3.356c-.347 0-.629-.283-.629-.629v-5.201c0-.347.282-.629.629-.629.346 0 .628.282.628.629v4.572h2.728c.347 0 .628.282.628.629 0 .347-.281.629-.628.629zm2.083 0c-.346 0-.628-.282-.628-.629v-5.201c0-.347.282-.629.628-.629.347 0 .629.282.629.629v5.201c0 .347-.282.629-.629.629zm5.341-2.836c0 .346-.282.629-.629.629h-1.631v1.578h1.631c.347 0 .629.283.629.629 0 .347-.282.629-.629.629h-2.261c-.346 0-.628-.282-.628-.629v-5.201c0-.347.282-.629.628-.629h2.261c.347 0 .629.282.629.629 0 .347-.282.629-.629.629h-1.631v1.444h1.631c.347 0 .629.282.629.629zm4.276 2.836c-.161 0-.322-.061-.444-.183l-2.486-2.485v2.039c0 .347-.282.629-.629.629-.346 0-.628-.282-.628-.629v-5.201c0-.347.282-.629.628-.629.162 0 .323.06.444.183l2.485 2.484v-2.038c0-.347.282-.629.629-.629.346 0 .628.282.628.629v5.201c0 .347-.282.629-.628.629z"/>
                    </svg>
                    รับข้อมูลและคุยผ่าน LINE
                </button>
            </form>
        </div>
        
        <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-700 font-medium">กำลังพาท่านไปที่ LINE...</p>
        </div>
    </div>

    <div class="mt-6 text-center">
        <p class="text-gray-400 text-xs">ข้อมูลของท่านจะถูกเก็บเป็นความลับ</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ลิงก์ LINE OA ของคุณ (@SURE141)
        const LINE_URL = "https://line.me/R/ti/p/@SURE141"; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzcuLvRe4ggE9kJuckF-FYKAw4IJ7IVjr92XOZsNCZ0yV2fGNZ6RLdsqku0zaTk3nSm/exec";

        // ==========================================
        // 1. นำค่า Firebase Config ของคุณมาใส่ตรงนี้
        // ==========================================
        const YOUR_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAm3UhBeh1eli5pqwj5M2psXy1BnpQUI-Y",
            authDomain: "affiliate-583a4.firebaseapp.com",
            projectId: "affiliate-583a4",
            storageBucket: "affiliate-583a4.firebasestorage.app",
            messagingSenderId: "676676456404",
            appId: "1:676676456404:web:1aafdc4e1540f301841041",
            measurementId: "G-YK5GCP8ECY"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const shopParam = urlParams.get('shop');
        let hiddenShopName = null;

        if (shopParam) {
            hiddenShopName = shopParam;
            document.getElementById('shopFieldContainer').classList.add('hidden');
            document.getElementById('shopName').removeAttribute('required');
        }

        const ADMIN_PIN = "SURE0635824615";
        let currentPopupData = null; 
        let isPopupShowing = false;

        const mainView = document.getElementById('mainView');
        const adminView = document.getElementById('adminView');
        const popupModal = document.getElementById('popupModal');

        document.getElementById('openAdminBtn').addEventListener('click', () => {
            mainView.classList.add('hidden');
            adminView.classList.remove('hidden');
        });

        document.getElementById('backToHomeBtn').addEventListener('click', () => {
            adminView.classList.add('hidden');
            mainView.classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
            
            if (currentPopupData && currentPopupData.isActive && currentPopupData.imageUrl) {
                document.getElementById('popupImage').src = currentPopupData.imageUrl;
                popupModal.classList.remove('hidden');
                isPopupShowing = true;
            }
        });

        document.getElementById('loginAdminBtn').addEventListener('click', () => {
            if (document.getElementById('adminPassword').value === ADMIN_PIN) {
                document.getElementById('adminLoginForm').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        });

        document.getElementById('logoutAdminBtn').addEventListener('click', () => {
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminLoginForm').classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
        });

        document.getElementById('closePopupBtn').addEventListener('click', () => {
            popupModal.classList.add('hidden');
        });

        // ==========================================
        // ระบบจัดการป็อปอัพ (หลังบ้าน) ด้วยฐานข้อมูล
        // ==========================================
        let currentUser = null;
        let db = null;
        let auth = null;
        let dbPath = [];

        try {
            let firebaseConfig = YOUR_FIREBASE_CONFIG;
            
            if (!YOUR_FIREBASE_CONFIG.apiKey && typeof __firebase_config !== 'undefined') {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                firebaseConfig = JSON.parse(configStr);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                dbPath = ['artifacts', appId, 'public', 'data', 'popup_config', 'settings'];
            } else if (YOUR_FIREBASE_CONFIG.apiKey) {
                dbPath = ['popup_data', 'settings'];
            }
            
            if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                const initAuth = async () => {
                    try { 
                        if (!YOUR_FIREBASE_CONFIG.apiKey && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth); 
                        }
                    } 
                    catch (error) { console.error("Auth error:", error); }
                };

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) loadPopupSettings();
                });
                initAuth();
            }
        } catch (err) {
            console.error("Firebase init failed:", err);
        }

        function loadPopupSettings() {
            if (!currentUser || !db || dbPath.length === 0) return;
            const docRef = doc(db, ...dbPath);
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentPopupData = data; 
                    
                    document.getElementById('popupActiveToggle').checked = data.isActive === true;
                    if (data.imageUrl) {
                        document.getElementById('adminImagePreview').src = data.imageUrl;
                        document.getElementById('adminImagePreview').classList.remove('hidden');
                        document.getElementById('noImageText').classList.add('hidden');
                        
                        if (data.isActive && adminView.classList.contains('hidden') && !isPopupShowing) {
                            document.getElementById('popupImage').src = data.imageUrl;
                            popupModal.classList.remove('hidden');
                            isPopupShowing = true;
                        }
                    }
                }
            }, (error) => {
                console.error("Snapshot Error: ", error);
                if (error.code === 'permission-denied') {
                    // แจ้งเตือนถ้าผู้ใช้ลืมตั้งค่า Rules ของ Firebase
                    console.warn("⚠️ แจ้งเตือน: คุณยังไม่ได้เปิดสิทธิ์ (Rules) ใน Firebase");
                }
            });
        }

        let uploadedBase64 = null;
        document.getElementById('popupImageUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX_WIDTH) { h = Math.round((h * MAX_WIDTH) / w); w = MAX_WIDTH; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    uploadedBase64 = canvas.toDataURL('image/webp', 0.8);
                    
                    document.getElementById('adminImagePreview').src = uploadedBase64;
                    document.getElementById('adminImagePreview').classList.remove('hidden');
                    document.getElementById('noImageText').classList.add('hidden');
                };
            };
        });

        document.getElementById('savePopupBtn').addEventListener('click', async () => {
            if (!db) return alert("ไม่สามารถบันทึกได้! กรุณาตั้งค่า Firebase Config ให้เรียบร้อยก่อน");
            if (!currentUser) return alert("กำลังเชื่อมต่อระบบ กรุณารอสักครู่");
            const btn = document.getElementById('savePopupBtn');
            btn.innerHTML = "กำลังบันทึก...";
            
            try {
                const docRef = doc(db, ...dbPath);
                const dataToSave = { 
                    isActive: document.getElementById('popupActiveToggle').checked 
                };
                
                if (uploadedBase64) {
                    dataToSave.imageUrl = uploadedBase64;
                } else if (document.getElementById('adminImagePreview').src) {
                    dataToSave.imageUrl = document.getElementById('adminImagePreview').src;
                }

                await setDoc(docRef, dataToSave, { merge: true });
                alert("บันทึกการตั้งค่าป็อปอัพเรียบร้อย!\n(กดปุ่ม 'ปิดหน้าต่างนี้' เพื่อดูตัวอย่าง Popup)");
            } catch (error) {
                console.error("Save Error: ", error);
                
                // แจ้งเตือนวิธีแก้ปัญหาโดยตรงให้ผู้ใช้
                if (error.code === 'permission-denied') {
                    alert("⚠️ บันทึกไม่สำเร็จ: ติดระบบรักษาความปลอดภัยของ Firebase (Permission Denied)\n\nวิธีแก้ไข:\n1. ไปที่เว็บไซต์ Firebase Console\n2. เลือกโปรเจกต์ของคุณ\n3. ไปที่เมนู 'Firestore Database'\n4. เลือกแท็บ 'Rules'\n5. เปลี่ยนโค้ดตรงกลางเป็น allow read, write: if true;\n6. กด Publish");
                } else {
                    alert("เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่อีกครั้ง");
                }
            } finally {
                btn.innerHTML = "บันทึกการตั้งค่าป็อปอัพ";
            }
        });

        // ==========================================
        // ส่วนจัดการฟอร์มลงทะเบียนลูกค้า
        // ==========================================

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            
            let finalShopName = hiddenShopName || document.getElementById('shopName').value;
            if(!finalShopName) finalShopName = "ไม่ระบุแหล่งที่มา";

            document.getElementById('loadingOverlay').classList.remove('hidden');

            const formData = new FormData();
            formData.append('fullName', fullName);
            formData.append('phone', "'" + phone); 
            formData.append('shopName', finalShopName);

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' 
                });

                window.location.href = LINE_URL;

            } catch (error) {
                console.error("Error: ", error);
                window.location.href = LINE_URL; 
            }
        });
    </script>
</body>
</html>
